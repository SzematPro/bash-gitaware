name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-build-test:
    name: lint, build-freshness, tests
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Show bash version
        run: bash --version

      - name: Build (regenerate new.bashrc from lib/)
        run: bash bin/build.sh

      - name: Build-freshness check
        run: |
          if ! git diff --exit-code -- new.bashrc; then
            echo "::error::new.bashrc is out of date. Run 'make build' and commit the result."
            exit 1
          fi

      - name: Lint (shellcheck on the generated artifact + scripts)
        run: shellcheck -x new.bashrc bin/*.sh tests/*.sh

      - name: Run tests
        run: bash tests/run.sh
