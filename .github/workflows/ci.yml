name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-build-test:
    name: lint, build-freshness, tests (ubuntu)
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Show bash version
        run: bash --version

      - name: Build (regenerate new.bashrc from lib/)
        run: bash bin/build.sh

      - name: Build-freshness check
        run: |
          if ! git diff --exit-code -- new.bashrc; then
            echo "::error::new.bashrc is out of date. Run 'make build' and commit the result."
            exit 1
          fi

      - name: Lint (shellcheck on the generated artifact + scripts)
        run: shellcheck -x new.bashrc bin/*.sh tests/*.sh install.sh

      - name: Run tests
        run: bash tests/run.sh

  bash-versions:
    name: tests on bash ${{ matrix.bash-version }}
    runs-on: ubuntu-latest
    container:
      image: bash:${{ matrix.bash-version }}
    strategy:
      fail-fast: false
      matrix:
        bash-version: ['4.4', '5.0', '5.1', '5.2', 'latest']
    steps:
      - name: Install git + ncurses (bash docker image is minimal Alpine)
        run: apk add --no-cache git ncurses shadow

      - name: Check out repository
        uses: actions/checkout@v4

      - name: Show bash version
        run: bash --version

      # The test suite assumes a non-root user (the prompt symbol is `#`
      # under root by design, but the test fixtures assert the `☟`
      # symbol from the unicode/nerd tier or `>` from ascii). The bash
      # docker images run as root by default; create a runner user and
      # hand the workspace over to it before invoking the suite.
      - name: Create non-root runner + run tests
        run: |
          adduser -D -h /home/bgauser bgauser
          chown -R bgauser:bgauser .
          su -s /bin/sh -c "cd $(pwd) && bash tests/run.sh" bgauser

  macos-tests:
    name: tests on macos (Homebrew bash)
    runs-on: macos-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Homebrew bash
        run: brew install bash

      - name: Run tests with Homebrew bash
        run: |
          if [ -x /opt/homebrew/bin/bash ]; then
            BASH_BIN=/opt/homebrew/bin/bash
          elif [ -x /usr/local/bin/bash ]; then
            BASH_BIN=/usr/local/bin/bash
          else
            echo "::error::Homebrew bash not found"
            exit 1
          fi
          "$BASH_BIN" --version
          "$BASH_BIN" tests/run.sh
